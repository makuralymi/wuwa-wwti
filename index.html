<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WWTI 经典版人格测试</title>
  <style>
    :root {
      --bg: #111;
      --panel: #202020;
      --panel-2: #2a2a2a;
      --text: #fff;
      --muted: #b7b7b7;
      --line: #3a3a3a;
      --accent: #f4c542;
      --danger: #ff5c7a;
      --ok: #5ad6b8;
      --radius: 8px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(244, 197, 66, 0.10), transparent 30%),
        linear-gradient(315deg, rgba(255, 92, 122, 0.12), transparent 28%),
        var(--bg);
      color: var(--text);
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      text-align: center;
    }

    h1, h2, h3, p { margin: 0; }
    button {
      font: inherit;
      cursor: pointer;
      border: 0;
      border-radius: var(--radius);
      transition: transform .14s ease, background .14s ease, border-color .14s ease;
    }
    button:hover { transform: translateY(-1px); }

    .shell {
      width: min(920px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 50px;
    }

    .card {
      max-width: 720px;
      margin: 28px auto;
      padding: 22px;
      background: rgba(32, 32, 32, 0.94);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 18px 50px rgba(0, 0, 0, .32);
    }

    .wide-card {
      max-width: 1040px;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .eyebrow {
      display: inline-flex;
      margin-bottom: 14px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--accent);
      background: #181818;
      font-size: 12px;
      font-weight: 800;
    }

    .title {
      font-size: clamp(34px, 8vw, 74px);
      line-height: 1.02;
    }

    .subtitle {
      max-width: 680px;
      margin: 16px auto 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.8;
    }

    .actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }

    .btn, .option {
      display: block;
      width: min(460px, 100%);
      margin: 10px auto;
      padding: 12px 18px;
      background: #444;
      color: #fff;
    }

    .btn:hover, .option:hover { background: #666; }
    .btn-accent {
      background: var(--accent);
      color: #111;
      font-weight: 900;
    }
    .btn-accent:hover { background: #ffd767; }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--line);
      color: #fff;
    }
    .btn-ghost:hover { background: #2f2f2f; }

    .hero-art, .result-img, .type-img {
      width: 100%;
      max-width: 560px;
      margin: 20px auto 0;
      display: block;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #181818;
    }

    .hero-host {
      width: 100%;
      max-width: 560px;
      margin: 20px auto 0;
    }

    .type-art {
      position: relative;
      overflow: hidden;
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius);
      background:
        radial-gradient(circle at 18% 20%, var(--art-glow), transparent 30%),
        radial-gradient(circle at 82% 18%, rgba(255, 255, 255, 0.08), transparent 18%),
        linear-gradient(145deg, var(--art-fade), rgba(255, 255, 255, 0.03) 42%, rgba(0, 0, 0, 0.16)),
        #151515;
      isolation: isolate;
    }

    .type-art-large {
      max-width: 560px;
      min-height: 360px;
      margin: 20px auto 0;
      padding: 18px;
    }

    .type-art-small {
      min-height: 238px;
      padding: 12px;
    }

    .art-kicker {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 2;
      padding: 6px 10px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 999px;
      background: rgba(20, 20, 20, 0.78);
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.4;
    }

    .type-art-small .art-kicker {
      top: 12px;
      left: 12px;
      max-width: calc(100% - 24px);
      font-size: 11px;
    }

    .art-code {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 1;
      color: var(--art-accent);
      font-size: clamp(42px, 8vw, 86px);
      font-weight: 900;
      line-height: 1;
      opacity: 0.14;
      letter-spacing: 0;
    }

    .type-art-small .art-code {
      font-size: 52px;
    }

    .art-icons {
      position: absolute;
      inset: 54px 12px 76px 12px;
      z-index: 1;
    }

    .type-art-small .art-icons {
      inset: 54px 8px 64px 8px;
    }

    .art-icon {
      position: absolute;
      display: block;
      width: 42%;
      max-width: 220px;
      filter: drop-shadow(0 16px 24px rgba(0, 0, 0, 0.28));
      user-select: none;
      pointer-events: none;
    }

    .art-icon-1 {
      left: 4%;
      bottom: 0;
      transform: rotate(-12deg);
    }

    .art-icon-2 {
      right: 4%;
      top: 4%;
      width: 34%;
      transform: rotate(11deg);
    }

    .art-icon-3 {
      left: 30%;
      top: 6%;
      width: 24%;
      transform: rotate(8deg);
    }

    .art-icon-4 {
      right: 24%;
      bottom: 4%;
      width: 22%;
      transform: rotate(-9deg);
    }

    .type-art-small .art-icon-1 {
      width: 45%;
      left: 2%;
    }

    .type-art-small .art-icon-2 {
      width: 36%;
      right: 2%;
    }

    .art-caption {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 18px;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
    }

    .type-art-small .art-caption {
      left: 12px;
      right: 12px;
      bottom: 12px;
      display: block;
    }

    .art-title {
      display: block;
      color: #fff;
      font-size: clamp(24px, 4vw, 40px);
      font-weight: 900;
      line-height: 1.08;
      text-shadow: 0 10px 20px rgba(0, 0, 0, 0.35);
    }

    .type-art-small .art-title {
      font-size: 19px;
    }

    .art-subtitle {
      display: block;
      margin-top: 6px;
      color: var(--art-accent);
      font-size: 14px;
      font-weight: 800;
      line-height: 1.5;
    }

    .type-art-small .art-subtitle {
      font-size: 12px;
    }

    .art-note {
      display: block;
      max-width: 240px;
      color: #e8e8e8;
      font-size: 13px;
      line-height: 1.6;
      text-align: right;
    }

    .type-art-small .art-note {
      max-width: none;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      text-align: left;
    }

    .home-art {
      min-height: 380px;
    }

    .home-art .art-icons {
      inset: 58px 10px 96px 10px;
    }

    .home-art .art-caption {
      display: block;
      text-align: left;
    }

    .home-art .art-note {
      max-width: none;
      margin-top: 12px;
      text-align: left;
    }

    .home-badges {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 116px;
      z-index: 2;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .home-badge {
      padding: 6px 9px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 999px;
      background: rgba(18, 18, 18, 0.78);
      color: #f3f3f3;
      font-size: 12px;
      line-height: 1.4;
    }

    .result-taunt {
      margin-top: 10px;
      color: var(--accent);
      font-size: 15px;
      font-weight: 800;
      line-height: 1.7;
    }

    .progress {
      margin-bottom: 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .bar {
      width: 100%;
      height: 10px;
      margin-top: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: #141414;
      border: 1px solid var(--line);
    }

    .bar span {
      display: block;
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--danger), var(--ok));
      transition: width .18s ease;
    }

    #question {
      font-size: clamp(24px, 5vw, 40px);
      line-height: 1.25;
      margin-bottom: 16px;
    }

    .result-code {
      color: var(--accent);
      font-size: clamp(38px, 8vw, 76px);
      line-height: 1;
      margin-bottom: 8px;
    }

    .result-name {
      font-size: clamp(24px, 5vw, 42px);
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .desc {
      color: #e8e8e8;
      white-space: pre-wrap;
      font-size: 16px;
      line-height: 1.9;
    }

    .score-list {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 16px;
    }

    .score-pill {
      padding: 7px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #181818;
      color: var(--muted);
      font-size: 12px;
    }

    .option-label {
      display: block;
      font-size: 16px;
      line-height: 1.6;
    }

    .option {
      text-align: left;
    }

    .option-meta {
      display: block;
      margin-top: 6px;
      color: var(--accent);
      font-size: 12px;
      line-height: 1.6;
    }

    .cheat-tip {
      margin-bottom: 16px;
      padding: 10px 12px;
      border: 1px dashed rgba(244, 197, 66, 0.45);
      border-radius: var(--radius);
      background: rgba(244, 197, 66, 0.08);
      color: #f8e29b;
      font-size: 12px;
      line-height: 1.7;
      text-align: left;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      margin-top: 20px;
      text-align: left;
    }

    .type-card {
      width: 100%;
      margin: 0;
      padding: 12px;
      border: 1px solid var(--line);
      background: #1b1b1b;
      color: #fff;
      text-align: left;
    }

    .type-card:hover { background: #262626; }
    .type-card strong {
      display: block;
      margin-top: 10px;
      font-size: 18px;
      line-height: 1.35;
    }
    .type-card .type-taunt {
      display: block;
      margin-top: 6px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.55;
    }
    .type-card span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .type-detail {
      display: none;
      grid-template-columns: minmax(220px, .75fr) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
      margin-top: 18px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #181818;
      text-align: left;
    }
    .type-detail.active { display: grid; }
    .type-detail h3 {
      color: var(--accent);
      font-size: clamp(28px, 5vw, 52px);
      line-height: 1.1;
    }
    .type-detail p {
      margin-top: 12px;
      color: #e8e8e8;
      line-height: 1.85;
      white-space: pre-wrap;
    }

    .note {
      margin-top: 14px;
      color: #8f8f8f;
      font-size: 12px;
      line-height: 1.7;
    }

    @media (max-width: 640px) {
      .shell { width: min(100% - 22px, 920px); padding-top: 14px; }
      .card { margin: 14px auto; padding: 16px; }
      .actions .btn { width: 100%; }
      .type-detail { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section id="home" class="screen active">
      <div class="card">
        <div class="eyebrow">WWTI classic</div>
        <h1 class="title">鸣潮社区人格测试</h1>
        <p class="subtitle">不要拿它当正经心理测评, 这只是给互联网围观群众做的电子外号生成器。</p>
        <div id="homeHero" class="hero-host"></div>
        <div class="actions">
          <button class="btn btn-accent" id="startBtn">开始测试</button>
          <button class="btn btn-ghost" id="galleryBtn">查看人格图鉴</button>
        </div>
        <p class="note">本页为粉丝向娱乐内容。鸣潮相关角色、术语与世界观属于其权利方。</p>
      </div>
    </section>

    <section id="quiz" class="screen">
      <div class="card" id="quizCard">
        <div class="progress">
          <span id="progressText">1 / 12</span>
          <div class="bar"><span id="progressBar"></span></div>
        </div>
        <div id="cheatTip" class="cheat-tip" hidden></div>
        <h2 id="question">加载中...</h2>
        <div id="options"></div>
        <div class="actions">
          <button class="btn btn-ghost" id="restartMidBtn">重开</button>
          <button class="btn btn-ghost" id="homeMidBtn">回首页</button>
        </div>
      </div>
    </section>

    <section id="result" class="screen">
      <div class="card" id="resultCard"></div>
    </section>

    <section id="gallery" class="screen">
      <div class="card wide-card">
        <div class="eyebrow">WWTI 图鉴</div>
        <h2 class="title">全部人格图鉴</h2>
        <p class="subtitle">点击卡片查看完整描述。这里用的是经典版判定库, 和 demo.html 的类型方向一致。</p>
        <div class="actions">
          <button class="btn btn-accent" id="galleryStartBtn">开始测试</button>
          <button class="btn btn-ghost" id="galleryHomeBtn">回首页</button>
        </div>
        <div id="typeDetail" class="type-detail"></div>
        <div id="galleryGrid" class="gallery-grid"></div>
      </div>
    </section>
  </main>

  <script>
    const questions = [
      {
        q: '你怎么看鸣潮?',
        a: [
          ['神作, 不接受反驳', 'kz'],
          ['一般, 但我还在玩', 'silent'],
          ['一坨答辩', 'kh'],
          ['我主要看乐子', 'chaos'],
          ['角色好看, 我先入坑', 'waifu']
        ]
      },
      {
        q: '你最常刷哪类视频?',
        a: [
          ['角色二创和名场面剪辑', 'oshi'],
          ['吹爆或怒喷视频', 'drama'],
          ['配队和声骸攻略', 'guide'],
          ['剧情解析和角色考据', 'story'],
          ['测试服偷跑爆料', 'leak']
        ]
      },
      {
        q: '你会认真看剧情吗?',
        a: [
          ['全跳, 奖励在哪', 'speed'],
          ['只看我推的角色', 'waifu'],
          ['认真看, 还会复盘', 'story'],
          ['看完专门找槽点', 'critic'],
          ['只看名场面切片', 'normal']
        ]
      },
      {
        q: '你发评论的主要目的是什么?',
        a: [
          ['分享体验', 'normal'],
          ['替玩家抱不平', 'kh'],
          ['带点节奏', 'drama'],
          ['刷存在感', 'chaos'],
          ['给新人指路', 'guide']
        ]
      },
      {
        q: '看到版本争议, 你第一反应是?',
        a: [
          ['先看完整信息再说', 'logic'],
          ['库洛又来了', 'kh'],
          ['不说话, 看猴戏', 'silent'],
          ['先护一手, 等反转', 'kz'],
          ['先搬板凳, 等开庭', 'chaos']
        ]
      },
      {
        q: '你最在意什么?',
        a: [
          ['强度和效率', 'speed'],
          ['角色和人设', 'waifu'],
          ['剧情和演出', 'story'],
          ['乐子和流量', 'chaos'],
          ['声骸词条毕业', 'echo']
        ]
      },
      {
        q: '如果官方犯错, 你会?',
        a: [
          ['理性分析问题', 'logic'],
          ['搬出旧账一起算', 'kh'],
          ['当做没看见', 'silent'],
          ['做素材, 赶热度', 'traffic'],
          ['等公告补偿再评价', 'normal']
        ]
      },
      {
        q: '你怎么看另一款竞品游戏?',
        a: [
          ['不关我事', 'silent'],
          ['不比较, 我只玩我想玩的', 'normal'],
          ['看吵架比看游戏有意思', 'chaos'],
          ['拿隔壁给库洛上课', 'kh'],
          ['两边都玩, 所以我最客观', 'ego']
        ]
      },
      {
        q: '新角色出来后, 你最先看?',
        a: [
          ['倍率和机制', 'speed'],
          ['立绘和性格', 'waifu'],
          ['有没有节奏点', 'drama'],
          ['偷跑情报准不准', 'leak'],
          ['戏份多不多', 'oshi']
        ]
      },
      {
        q: '你最常说的一句话像哪句?',
        a: [
          ['其实可以更好', 'logic'],
          ['你懂个屁', 'rage'],
          ['无所谓', 'silent'],
          ['我早就说了', 'ego'],
          ['先别急, 看后续', 'normal']
        ]
      },
      {
        q: '看到攻略标题“版本答案来了”, 你会?',
        a: [
          ['立刻收藏照抄', 'guide'],
          ['先看评论区有没有骂错', 'critic'],
          ['转发给朋友一起审判', 'group'],
          ['我自己会算, 不用你教', 'logic'],
          ['直接打成收米作业', 'drama']
        ]
      },
      {
        q: '你说退坑之后通常会?',
        a: [
          ['真不看了', 'silent'],
          ['每天还刷消息', 'dead'],
          ['回来确认我没亏', 'ego'],
          ['等下个大节奏', 'chaos'],
          ['回来领补偿再走', 'normal']
        ]
      },
      {
        q: '前瞻前刷到偷跑图, 你会?',
        a: [
          ['先看来源, 当情报参考', 'leak'],
          ['等官方, 不被剧透', 'silent'],
          ['转给朋友一起吃瓜', 'group'],
          ['看机制会不会影响抽卡', 'logic'],
          ['先看立绘戳不戳我', 'waifu']
        ]
      },
      {
        q: '你抽角色最常见的理由是?',
        a: [
          ['强度够高, 能改善体验', 'speed'],
          ['我单推, 不抽不算活着', 'oshi'],
          ['剧情写得好, 我被打动了', 'story'],
          ['想给队伍补最后一块拼图', 'guide'],
          ['不抽怕以后后悔', 'normal']
        ]
      },
      {
        q: '刷到一个能用但不完美的声骸, 你会?',
        a: [
          ['先用着, 不折磨自己', 'silent'],
          ['继续刷, 词条不够好', 'echo'],
          ['问大佬能不能凑合用', 'group'],
          ['算提升值再决定', 'logic'],
          ['截图发群求安慰', 'group']
        ]
      },
      {
        q: '你最受不了哪种情况?',
        a: [
          ['喜欢的角色戏份太少', 'oshi'],
          ['声骸副词条全歪', 'echo'],
          ['官方又犯低级错误', 'rage'],
          ['社区天天复读同一套节奏', 'critic'],
          ['攻略讲错还没人纠正', 'guide']
        ]
      }
    ];

    const typeData = {
      KXZ: {
        name: '库孝子',
        color: '#f4c542',
        tags: ['kz'],
        threshold: 2,
        unlock: '护游/信仰倾向达到 2 分。',
        desc: '你不玩游戏, 你是在守护信仰。\nBUG 是设计深度, 优化差是设备不配, 争议是玩家理解不够。\n你不是玩家, 你是公关部的外包志愿者。'
      },
      KH: {
        name: '库黑',
        color: '#ff5c7a',
        tags: ['kh'],
        threshold: 2,
        unlock: '稳定归因到库洛/官方问题的倾向达到 2 分。',
        desc: '你不是不满意某个版本, 你是已经把库洛写进嫌疑人名单第一行。\n争议还没展开, 你先把锅盖递过去。\n你不一定每次都错, 但你每次都准备好了那句: 我早说过。'
      },
      JZDS: {
        name: '节奏大师',
        color: '#ff7a45',
        tags: ['drama', 'rage', 'chaos', 'traffic'],

      },

        unlock: '攻略/纠错/效率指导倾向合计达到 2 分。',
        desc: '你看到别人玩游戏, 就像教导主任看到学生没穿校服。\n配队要管, 词条要管, 手法要管, 连别人爽不爽你都要审批。\n你不是攻略作者, 你是评论区流动监考。'
      },
      SMD: {

        color: '#b7b7b7',

    const galleryOrder = ['KXZ', 'KH', 'JZDS', 'MLXR', 'OSHI', 'SPEED', 'ECHO', 'CTRL', 'LEAK', 'MZK', 'MMR', 'DEAD', 'WOC', 'SMD'];
    const resultOrder = ['KXZ', 'KH', 'JZDS', 'MLXR', 'OSHI', 'SPEED', 'ECHO', 'LEAK', 'CTRL', 'MZK', 'MMR', 'DEAD', 'WOC', 'SMD'];
    const typeArt = {
      KXZ: {
        kicker: '这波我先护一下',
        subtitle: '玩家受苦不重要, 信仰不能输',
        note: '先想想是不是玩家不懂',
        icons: ['assets/openmoji/1F6E1.svg', 'assets/openmoji/1F451.svg']
      },
      KH: {

        note: '锅先递过去再说',
        icons: ['assets/openmoji/1F50D.svg', 'assets/openmoji/1F6A8.svg']
      },
      JZDS: {
        kicker: '别管真假先起势',
        subtitle: '没证据也能把评论区点着',
        note: '真相没到, 流量先到',

      },

      },
      SPEED: {

      },
      ECHO: {

      },
      CTRL: {

        note: '别人随便玩也要改卷',

      },
      LEAK: {
        kicker: '前瞻前我已知晓',
        subtitle: '前瞻没开, 你已经过完下版本',
        note: '版本没开, 情绪先开',

      },
      MZK: {
        kicker: '我只是客观',
        subtitle: '嘴上不站队, 手上全是判词',
        note: '句句理性, 句句带刺',
        icons: ['assets/openmoji/1F9D0.svg', 'assets/openmoji/2696.svg']
      },
      MMR: {
        kicker: '呜呜她好可爱',
        subtitle: '剧情一煽情, 头像框先换上',
        note: '会哭会存表情包',
        icons: ['assets/openmoji/1F97A.svg', 'assets/openmoji/1F9F8.svg']
      },
      DEAD: {
        kicker: '退了, 但每天都看',
        subtitle: '嘴上退坑, 身体还在签到',
        note: '人退坑了, 号还在巡逻',
        icons: ['assets/openmoji/1F47B.svg', 'assets/openmoji/1F4F1.svg']
      },
      WOC: {
        kicker: '卧槽, 发群里',
        subtitle: '自己不吵, 但一定转给别人看',

        icons: ['assets/openmoji/1F4F9.svg', 'assets/openmoji/1F37F.svg']
      },
      SMD: {
        kicker: '我就看看',
        subtitle: '全都知道, 只是懒得搭理',
        note: '看完点个赞就走',
        icons: ['assets/openmoji/1F910.svg', 'assets/openmoji/1F440.svg']
      }
    };

    const homeArt = {
      kicker: '全员嘴硬版总海报',
      title: '测你是哪种鸣潮社区人口',
      subtitle: '16 道题, 不测心理学, 只测你会在哪种评论区站到最后',
      note: '护游的、挑刺的、吃瓜的、退坑还巡逻的, 都跑不掉。',
      icons: [
        'assets/openmoji/1F6E1.svg',
        'assets/openmoji/1F525.svg',
        'assets/openmoji/1F49D.svg',
        'assets/openmoji/1F47B.svg'
      ],
      badges: ['护游嘴硬', '吃瓜转发', '词条劳改', '退坑巡逻', '理中客开庭', '本命电子供奉']
    };

    function withAlpha(hex, alpha) {
      const safeHex = (hex || '#f4c542').replace('#', '');
      const normalized = safeHex.length === 3
        ? safeHex.split('').map(char => char + char).join('')
        : safeHex;
      const r = parseInt(normalized.slice(0, 2), 16);
      const g = parseInt(normalized.slice(2, 4), 16);
      const b = parseInt(normalized.slice(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function renderTypeArt(code, variant = 'large') {
      const type = typeData[code];
      const art = typeArt[code];
      if (!type || !art) {
        return `<img class="${variant === 'small' ? 'type-img' : 'result-img'}" src="${svgFor(code)}" alt="${code} ${type ? type.name : 'WWTI'}">`;
      }

      const iconMarkup = art.icons.map((src, index) => `
        <img class="art-icon art-icon-${index + 1}" src="${src}" alt="" aria-hidden="true">
      `).join('');

      return `
        <div
          class="type-art ${variant === 'small' ? 'type-art-small' : 'type-art-large'}"
          role="img"
          aria-label="${code} ${type.name} 配图: ${art.kicker}"
          style="--art-accent: ${type.color}; --art-glow: ${withAlpha(type.color, 0.28)}; --art-fade: ${withAlpha(type.color, 0.10)};"
        >
          <div class="art-kicker">${art.kicker}</div>
          <div class="art-code">${code}</div>
          <div class="art-icons">${iconMarkup}</div>
          <div class="art-caption">
            <div>
              <strong class="art-title">${type.name}</strong>
              <span class="art-subtitle">${art.subtitle}</span>
            </div>
            <span class="art-note">${art.note}</span>
          </div>
        </div>
      `;
    }

    function renderHomeArt() {
      const iconMarkup = homeArt.icons.map((src, index) => `
        <img class="art-icon art-icon-${index + 1}" src="${src}" alt="" aria-hidden="true">
      `).join('');
      const badgeMarkup = homeArt.badges.map(label => `<span class="home-badge">${label}</span>`).join('');

      return `
        <div
          class="type-art type-art-large home-art"
          role="img"
          aria-label="WWTI 总海报"
          style="--art-accent: #f4c542; --art-glow: rgba(244, 197, 66, 0.26); --art-fade: rgba(255, 92, 122, 0.10);"
        >
          <div class="art-kicker">${homeArt.kicker}</div>
          <div class="art-code">WWTI</div>
          <div class="art-icons">${iconMarkup}</div>
          <div class="home-badges">${badgeMarkup}</div>
          <div class="art-caption">
            <strong class="art-title">${homeArt.title}</strong>
            <span class="art-subtitle">${homeArt.subtitle}</span>
            <span class="art-note">${homeArt.note}</span>
          </div>
        </div>
      `;
    }

    function queryHasCheat() {
      const pageQuery = new URLSearchParams(window.location.search);
      if (pageQuery.get('cheat') === '1') {
        return true;
      }

      const hashQueryStart = window.location.hash.indexOf('?');
      if (hashQueryStart === -1) {
        return false;
      }

      const hashQuery = new URLSearchParams(window.location.hash.slice(hashQueryStart + 1));
      return hashQuery.get('cheat') === '1';
    }

    const cheatMode = queryHasCheat();

    const state = {
      index: 0,
      score: {},
      lastType: null,
      roundQuestions: []
    };

    const screens = {
      home: document.getElementById('home'),
      quiz: document.getElementById('quiz'),
      result: document.getElementById('result'),
      gallery: document.getElementById('gallery')
    };

    function showScreen(name) {
      Object.entries(screens).forEach(([key, el]) => {
        el.classList.toggle('active', key === name);
      });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetScore() {
      state.score = {};
      const allTags = new Set();
      questions.forEach(q => q.a.forEach(opt => allTags.add(opt[1])));
      Object.values(typeData).forEach(type => type.tags.forEach(tag => allTags.add(tag)));
      allTags.forEach(tag => { state.score[tag] = 0; });
    }

    function getTypeScore(type) {
      return type.tags.reduce((sum, tag) => sum + (state.score[tag] || 0), 0);
    }

    function matchesType(type) {
      return getTypeScore(type) >= type.threshold;
    }

    function getTypesForTag(tag) {
      return resultOrder.filter(code => typeData[code].tags.includes(tag));
    }

    function renderOptionMeta(tag) {
      if (!cheatMode) {
        return '';
      }

      const linkedTypes = getTypesForTag(tag);
      const typeText = linkedTypes.length
        ? linkedTypes.map(code => `${code} ${typeData[code].name}`).join(' / ')
        : '当前不直接关联人格';

      return `<span class="option-meta">+1 ${tag} · 关联人格: ${typeText}</span>`;
    }

    function svgFor(typeCode) {
      const type = typeData[typeCode] || { name: 'WWTI', color: '#f4c542' };
      const safeTitle = `${typeCode || 'WWTI'} ${type.name}`;
      const color = type.color;
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560">
          <rect width="900" height="560" rx="18" fill="#151515"/>
          <path d="M54 92 C185 20 305 30 420 112 C548 204 652 174 828 78 L828 198 C650 288 530 318 392 235 C284 170 180 190 54 270 Z" fill="${color}" opacity=".28"/>
          <path d="M90 452 C235 354 365 335 486 392 C608 450 706 438 810 360" fill="none" stroke="${color}" stroke-width="28" stroke-linecap="round" opacity=".72"/>
          <circle cx="450" cy="280" r="116" fill="#202020" stroke="${color}" stroke-width="18"/>
          <path d="M370 282 H530 M450 202 V358 M400 230 L500 330 M500 230 L400 330" stroke="#fff" stroke-width="18" stroke-linecap="round"/>
          <text x="450" y="86" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="28" font-weight="800">WWTI CLASSIC</text>
          <text x="450" y="492" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="58" font-weight="900">${safeTitle}</text>
        </svg>
      `;
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    function shuffleArray(items) {
      const result = [...items];
      for (let i = result.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [result[i], result[j]] = [result[j], result[i]];
      }
      return result;
    }

    function buildRoundQuestions() {
      return shuffleArray(questions.map(question => ({
        q: question.q,
        a: shuffleArray(question.a.map(option => [...option]))
      })));
    }

    function startTest() {
      state.index = 0;
      state.lastType = null;
      state.roundQuestions = buildRoundQuestions();
      resetScore();
      showScreen('quiz');
      renderQuestion();
    }

    function renderQuestion() {
      if (state.index >= state.roundQuestions.length) {
        showResult();
        return;
      }

      const q = state.roundQuestions[state.index];
      const percent = Math.round((state.index / state.roundQuestions.length) * 100);
      document.getElementById('progressText').innerText = `${state.index + 1} / ${state.roundQuestions.length}`;
      document.getElementById('progressBar').style.width = `${percent}%`;
      document.getElementById('question').innerText = q.q;
      const cheatTip = document.getElementById('cheatTip');

      if (cheatMode) {
        cheatTip.hidden = false;
        cheatTip.innerText = 'Cheat 模式已开启: 每个选项都会显示 +1 的标签，以及该标签会影响哪些人格。最终结果仍受阈值和优先级影响。';
      } else {
        cheatTip.hidden = true;
        cheatTip.innerText = '';
      }

      document.getElementById('options').innerHTML = q.a.map(opt => {
        return `
          <button class="option" onclick="choose('${opt[1]}')">
            <span class="option-label">${opt[0]}</span>
            ${renderOptionMeta(opt[1])}
          </button>
        `;
      }).join('');
    }

    function choose(tag) {
      if (state.score[tag] !== undefined) {
        state.score[tag]++;
      }
      state.index++;
      renderQuestion();
    }

    function pickType() {
      const typeScores = {};
      Object.entries(typeData).forEach(([code, type]) => {
        typeScores[code] = getTypeScore(type);
      });

      for (const code of resultOrder) {
        if (matchesType(typeData[code])) {
          return { code, typeScores };
        }
      }

      return { code: 'SMD', typeScores };
    }

    function renderScoreList() {
      return Object.entries(state.score)
        .filter(([, value]) => value > 0)
        .sort((a, b) => b[1] - a[1])
        .map(([tag, value]) => `<span class="score-pill">${tag}: ${value}</span>`)
        .join('');
    }

    function showResult() {
      document.getElementById('progressBar').style.width = '100%';
      const picked = pickType();
      const type = typeData[picked.code];
      state.lastType = picked.code;

      document.getElementById('resultCard').innerHTML = `
        <div class="eyebrow">你的 WWTI 类型是</div>
        <h1 class="result-code">${picked.code}</h1>
        <h2 class="result-name">${type.name}</h2>
        <p class="result-taunt">${typeArt[picked.code].subtitle}</p>
        <p class="desc">${type.desc}</p>
        ${renderTypeArt(picked.code, 'large')}
        <div class="score-list">${renderScoreList()}</div>
        <div class="actions">
          <button class="btn btn-accent" onclick="startTest()">再测一次</button>
          <button class="btn btn-ghost" onclick="showGallery('${picked.code}')">查看图鉴</button>
          <button class="btn btn-ghost" onclick="showScreen('home')">回首页</button>
        </div>
      `;
      showScreen('result');
    }

    function renderGallery() {
      document.getElementById('galleryGrid').innerHTML = galleryOrder.map(code => {
        const type = typeData[code];
        return `
          <button class="type-card" onclick="renderTypeDetail('${code}')">
            ${renderTypeArt(code, 'small')}
            <strong>${code} - ${type.name}</strong>
            <span class="type-taunt">${typeArt[code].subtitle}</span>
            <span>${type.desc.split('\\n')[0]}</span>
          </button>
        `;
      }).join('');
    }

    function renderTypeDetail(code) {
      const type = typeData[code];
      const detail = document.getElementById('typeDetail');
      detail.classList.add('active');
      detail.innerHTML = `
        ${renderTypeArt(code, 'large')}
        <div>
          <h3>${code} - ${type.name}</h3>
          <p class="result-taunt">${typeArt[code].subtitle}</p>
          <p>${type.desc}</p>
          <p>达成方式: ${type.unlock}</p>
          <p>命中标签: ${type.tags.join(' / ')}</p>
        </div>
      `;
      detail.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function showGallery(focusCode) {
      showScreen('gallery');
      renderGallery();
      const detail = document.getElementById('typeDetail');
      if (focusCode && typeData[focusCode]) {
        renderTypeDetail(focusCode);
      } else {
        detail.classList.remove('active');
        detail.innerHTML = '';
      }
    }

    document.getElementById('homeHero').innerHTML = renderHomeArt();
    if (cheatMode) {
      document.querySelector('#home .note').innerText = '当前已启用 cheat 模式。答题页会显示每个选项的加分标签和关联人格。';
    }
    document.getElementById('startBtn').addEventListener('click', startTest);
    document.getElementById('galleryBtn').addEventListener('click', () => showGallery());
    document.getElementById('restartMidBtn').addEventListener('click', startTest);
    document.getElementById('homeMidBtn').addEventListener('click', () => showScreen('home'));
    document.getElementById('galleryStartBtn').addEventListener('click', startTest);
    document.getElementById('galleryHomeBtn').addEventListener('click', () => showScreen('home'));
  </script>
